# myx — tmux settings for correct colors and scrolling.
# Add to your tmux config (e.g. ~/.config/tmux/tmux.conf), or `source-file` it.

# 24-bit color for Ghostty's TERM (xterm-ghostty).
set -g  default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"

# Mouse for scrolling / selecting inside panes.
set -g mouse on
