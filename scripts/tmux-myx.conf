# myx — tmux settings for correct colors, mouse, and OSC 8 hyperlinks.
# Append to ~/.tmux.conf, or `source-file` this file from it.

# 24-bit color + OSC 8 hyperlink passthrough for Ghostty's TERM (xterm-ghostty).
# Requires tmux >= 3.4.
set -g  default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB:hyperlinks"

# Needed for clicking ▶Join (and scrolling) inside panes.
set -g mouse on
